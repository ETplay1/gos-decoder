<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Binär Entschlüssler</title>

<style>
body{
    font-family:Arial,sans-serif;
    background:#111;
    color:white;
    text-align:center;
    padding:40px;
}

textarea{
    width:90%;
    max-width:900px;
    height:220px;
    background:#222;
    color:white;
    border:1px solid #444;
    border-radius:10px;
    padding:10px;
    font-size:18px;
}

button{
    margin-top:20px;
    padding:12px 30px;
    font-size:18px;
    cursor:pointer;
}

#output{
    margin-top:30px;
    background:#222;
    padding:20px;
    border-radius:10px;
    word-wrap:break-word;
    font-size:20px;
}
</style>

</head>
<body>

<h1>Binär Entschlüssler</h1>

<p>0️⃣ und 1️⃣ oder normale 0 und 1 einfügen.</p>

<textarea id="input"></textarea>

<br>

<button onclick="decode()">Entschlüsseln</button>

<div id="output"></div>

<script>
function decode(){

    let text=document.getElementById("input").value;

    text=text
        .replace(/0️⃣/g,"0")
        .replace(/1️⃣/g,"1");

    text=text.replace(/[^01]/g,"");

    let result="";

    for(let i=0;i<text.length;i+=8){

        let byte=text.substring(i,i+8);

        if(byte.length===8){

            result+=String.fromCharCode(parseInt(byte,2));

        }

    }

    document.getElementById("output").textContent=result;

}
</script>

</body>
</html>
